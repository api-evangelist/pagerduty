principles:
  - name: Visibility
    description: Use Audit Trail and User Reports to track active vs licensed seats.
  - name: Allocation
    description: Tag teams to escalation policies; report seat consumption per business unit.
  - name: Optimization
    description: 'Right-size plan: stop paying Business for Pro features unused; reclaim inactive seats.'
  - name: Accountability
    description: Quarterly seat audit; renew at lower committed seat count where reclaim history supports
      it.
