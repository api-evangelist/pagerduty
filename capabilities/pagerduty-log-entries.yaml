naftiko: 1.0.0-alpha2
info:
  label: PagerDuty API — Log Entries
  description: 'PagerDuty API — Log Entries. 3 operations. Lead operation: PagerDuty List log entries. Self-contained Naftiko
    capability covering one Pagerduty business surface.'
  tags:
  - Pagerduty
  - Log Entries
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PAGERDUTY_API_KEY: PAGERDUTY_API_KEY
capability:
  consumes:
  - type: http
    namespace: pagerduty-log-entries
    baseUri: https://api.pagerduty.com
    description: PagerDuty API — Log Entries business capability. Self-contained, no shared references.
    resources:
    - name: log_entries
      path: /log_entries
      operations:
      - name: listlogentries
        method: GET
        description: PagerDuty List log entries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: log_entries-id
      path: /log_entries/{id}
      operations:
      - name: getlogentry
        method: GET
        description: PagerDuty Get a log entry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: log_entries-id-channel
      path: /log_entries/{id}/channel
      operations:
      - name: updatelogentrychannel
        method: PUT
        description: PagerDuty Update log entry channel information.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.PAGERDUTY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: pagerduty-log-entries-rest
    port: 8080
    description: REST adapter for PagerDuty API — Log Entries. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/log-entries
      name: log-entries
      description: REST surface for log_entries.
      operations:
      - method: GET
        name: listlogentries
        description: PagerDuty List log entries
        call: pagerduty-log-entries.listlogentries
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/log-entries/{id}
      name: log-entries-id
      description: REST surface for log_entries-id.
      operations:
      - method: GET
        name: getlogentry
        description: PagerDuty Get a log entry
        call: pagerduty-log-entries.getlogentry
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/log-entries/{id}/channel
      name: log-entries-id-channel
      description: REST surface for log_entries-id-channel.
      operations:
      - method: PUT
        name: updatelogentrychannel
        description: PagerDuty Update log entry channel information.
        call: pagerduty-log-entries.updatelogentrychannel
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pagerduty-log-entries-mcp
    port: 9090
    transport: http
    description: MCP adapter for PagerDuty API — Log Entries. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: pagerduty-list-log-entries
      description: PagerDuty List log entries
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pagerduty-log-entries.listlogentries
      outputParameters:
      - type: object
        mapping: $.
    - name: pagerduty-get-log-entry
      description: PagerDuty Get a log entry
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pagerduty-log-entries.getlogentry
      outputParameters:
      - type: object
        mapping: $.
    - name: pagerduty-update-log-entry-channel
      description: PagerDuty Update log entry channel information.
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: pagerduty-log-entries.updatelogentrychannel
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
