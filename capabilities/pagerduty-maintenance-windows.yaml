    namespace: pagerduty-maintenance-windows-rest
    port: 8080
    description: REST adapter for PagerDuty API — Maintenance Windows. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/maintenance-windows
      name: maintenance-windows
      description: REST surface for maintenance_windows.
      operations:
      - method: GET
        name: listmaintenancewindows
        description: PagerDuty List maintenance windows
        call: pagerduty-maintenance-windows.listmaintenancewindows
        outputParameters:
        - type: object
          mapping: $.
