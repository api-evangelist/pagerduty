    resources:
    - name: maintenance_windows
      path: /maintenance_windows
      operations:
      - name: listmaintenancewindows
        method: GET
        description: PagerDuty List maintenance windows
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createmaintenancewindow
        method: POST
        description: PagerDuty Create a maintenance window
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: maintenance_windows-id
      path: /maintenance_windows/{id}
      operations:
      - name: getmaintenancewindow
        method: GET
        description: PagerDuty Get a maintenance window
        outputRawFormat: json
        outputParameters:
