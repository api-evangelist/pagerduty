naftiko: 1.0.0-alpha2
info:
  label: PagerDuty API — Service Dependencies
  description: 'PagerDuty API — Service Dependencies. 4 operations. Lead operation: PagerDuty Associate service dependencies.
    Self-contained Naftiko capability covering one Pagerduty business surface.'
  tags:
  - Pagerduty
  - Service Dependencies
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PAGERDUTY_API_KEY: PAGERDUTY_API_KEY
capability:
  consumes:
  - type: http
    namespace: pagerduty-service-dependencies
    baseUri: https://api.pagerduty.com
    description: PagerDuty API — Service Dependencies business capability. Self-contained, no shared references.
    resources:
    - name: service_dependencies-associate
      path: /service_dependencies/associate
      operations:
      - name: createservicedependency
        method: POST
        description: PagerDuty Associate service dependencies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: service_dependencies-business_services-id
      path: /service_dependencies/business_services/{id}
      operations:
      - name: getbusinessserviceservicedependencies
        method: GET
        description: PagerDuty Get Business Service dependencies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: service_dependencies-disassociate
      path: /service_dependencies/disassociate
      operations:
      - name: deleteservicedependency
        method: POST
        description: PagerDuty Disassociate service dependencies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: service_dependencies-technical_services-id
      path: /service_dependencies/technical_services/{id}
      operations:
      - name: gettechnicalserviceservicedependencies
        method: GET
        description: PagerDuty Get technical service dependencies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.PAGERDUTY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: pagerduty-service-dependencies-rest
    port: 8080
    description: REST adapter for PagerDuty API — Service Dependencies. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/service-dependencies/associate
      name: service-dependencies-associate
      description: REST surface for service_dependencies-associate.
      operations:
      - method: POST
        name: createservicedependency
        description: PagerDuty Associate service dependencies
        call: pagerduty-service-dependencies.createservicedependency
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/service-dependencies/business-services/{id}
      name: service-dependencies-business-services-id
      description: REST surface for service_dependencies-business_services-id.
      operations:
      - method: GET
        name: getbusinessserviceservicedependencies
        description: PagerDuty Get Business Service dependencies
        call: pagerduty-service-dependencies.getbusinessserviceservicedependencies
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/service-dependencies/disassociate
      name: service-dependencies-disassociate
      description: REST surface for service_dependencies-disassociate.
      operations:
      - method: POST
        name: deleteservicedependency
        description: PagerDuty Disassociate service dependencies
        call: pagerduty-service-dependencies.deleteservicedependency
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/service-dependencies/technical-services/{id}
      name: service-dependencies-technical-services-id
      description: REST surface for service_dependencies-technical_services-id.
      operations:
      - method: GET
        name: gettechnicalserviceservicedependencies
        description: PagerDuty Get technical service dependencies
        call: pagerduty-service-dependencies.gettechnicalserviceservicedependencies
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pagerduty-service-dependencies-mcp
    port: 9090
    transport: http
    description: MCP adapter for PagerDuty API — Service Dependencies. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: pagerduty-associate-service-dependencies
      description: PagerDuty Associate service dependencies
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pagerduty-service-dependencies.createservicedependency
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: pagerduty-get-business-service-dependencies
      description: PagerDuty Get Business Service dependencies
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pagerduty-service-dependencies.getbusinessserviceservicedependencies
      outputParameters:
      - type: object
        mapping: $.
    - name: pagerduty-disassociate-service-dependencies
      description: PagerDuty Disassociate service dependencies
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pagerduty-service-dependencies.deleteservicedependency
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: pagerduty-get-technical-service-dependencies
      description: PagerDuty Get technical service dependencies
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pagerduty-service-dependencies.gettechnicalserviceservicedependencies
      outputParameters:
      - type: object
        mapping: $.
