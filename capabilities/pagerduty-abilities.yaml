naftiko: 1.0.0-alpha2
info:
  label: PagerDuty API — Abilities
  description: 'PagerDuty API — Abilities. 2 operations. Lead operation: PagerDuty List abilities. Self-contained Naftiko
    capability covering one Pagerduty business surface.'
  tags:
  - Pagerduty
  - Abilities
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PAGERDUTY_API_KEY: PAGERDUTY_API_KEY
capability:
  consumes:
  - type: http
    namespace: pagerduty-abilities
    baseUri: https://api.pagerduty.com
    description: PagerDuty API — Abilities business capability. Self-contained, no shared references.
    resources:
    - name: abilities
      path: /abilities
      operations:
      - name: listabilities
        method: GET
        description: PagerDuty List abilities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: abilities-id
      path: /abilities/{id}
      operations:
      - name: getability
        method: GET
        description: PagerDuty Test an ability
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.PAGERDUTY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: pagerduty-abilities-rest
    port: 8080
    description: REST adapter for PagerDuty API — Abilities. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/abilities
      name: abilities
      description: REST surface for abilities.
      operations:
      - method: GET
        name: listabilities
        description: PagerDuty List abilities
        call: pagerduty-abilities.listabilities
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/abilities/{id}
      name: abilities-id
      description: REST surface for abilities-id.
      operations:
      - method: GET
        name: getability
        description: PagerDuty Test an ability
        call: pagerduty-abilities.getability
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pagerduty-abilities-mcp
    port: 9090
    transport: http
    description: MCP adapter for PagerDuty API — Abilities. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: pagerduty-list-abilities
      description: PagerDuty List abilities
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pagerduty-abilities.listabilities
      outputParameters:
      - type: object
        mapping: $.
    - name: pagerduty-test-ability
      description: PagerDuty Test an ability
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pagerduty-abilities.getability
      outputParameters:
      - type: object
        mapping: $.
